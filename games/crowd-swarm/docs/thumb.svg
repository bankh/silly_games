<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" role="img" aria-label="CrowdSwarm — grow your swarm and out-eat the rivals">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12305a"/>
      <stop offset="0.5" stop-color="#0b1830"/>
      <stop offset="1" stop-color="#05080f"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.42" cy="0.45" r="0.8">
      <stop offset="0.45" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="player" cx="0.38" cy="0.32" r="0.8">
      <stop offset="0" stop-color="#d6ffee"/>
      <stop offset="0.45" stop-color="#7dffb2"/>
      <stop offset="1" stop-color="#1fb866"/>
    </radialGradient>
    <radialGradient id="rivA" cx="0.38" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#ffd5e4"/><stop offset="0.5" stop-color="#ff7aa8"/><stop offset="1" stop-color="#bf2f6a"/>
    </radialGradient>
    <radialGradient id="rivB" cx="0.38" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#e0d6ff"/><stop offset="0.5" stop-color="#a78bff"/><stop offset="1" stop-color="#5e44c8"/>
    </radialGradient>
    <radialGradient id="rivC" cx="0.38" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#ffeccb"/><stop offset="0.5" stop-color="#ffc36b"/><stop offset="1" stop-color="#dc861f"/>
    </radialGradient>
    <radialGradient id="dot" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#d6f4ff"/><stop offset="0.55" stop-color="#6fd3ff"/><stop offset="1" stop-color="#2487c9"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#7fd0ff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="wob" x="-45%" y="-45%" width="190%" height="190%">
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="18" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="640" height="400" fill="url(#bg)"/>
  <rect width="640" height="400" fill="url(#grid)"/>
  <rect width="640" height="400" fill="url(#vig)"/>

  <!-- crowd dots (the "food") -->
  <g>
    <g fill="url(#dot)">
      <circle cx="78" cy="74" r="6"/><circle cx="128" cy="120" r="4.5"/><circle cx="96" cy="186" r="5"/>
      <circle cx="58" cy="262" r="5.5"/><circle cx="158" cy="330" r="4.5"/><circle cx="214" cy="92" r="5.5"/>
      <circle cx="256" cy="248" r="4.5"/><circle cx="356" cy="338" r="5.5"/><circle cx="430" cy="306" r="6"/>
      <circle cx="470" cy="214" r="4.5"/><circle cx="556" cy="150" r="5.5"/><circle cx="582" cy="252" r="5"/>
      <circle cx="600" cy="336" r="4.5"/><circle cx="506" cy="72" r="5.5"/><circle cx="404" cy="58" r="4.5"/>
      <circle cx="338" cy="150" r="4.5"/><circle cx="248" cy="176" r="5"/><circle cx="150" cy="232" r="4.5"/>
      <circle cx="612" cy="96" r="5"/><circle cx="300" cy="92" r="4.5"/>
    </g>
  </g>

  <!-- rival swarms -->
  <g>
    <g opacity="0.45" filter="url(#glow)"><circle cx="150" cy="150" r="42" fill="#a78bff"/></g>
    <circle cx="150" cy="150" r="42" fill="url(#rivB)" filter="url(#wob)"/>
    <text x="150" y="150" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#ffffff" fill-opacity="0.92" text-anchor="middle" dominant-baseline="central">8</text>

    <g opacity="0.45" filter="url(#glow)"><circle cx="500" cy="138" r="52" fill="#ff7aa8"/></g>
    <circle cx="500" cy="138" r="52" fill="url(#rivA)" filter="url(#wob)"/>
    <text x="500" y="138" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#ffffff" fill-opacity="0.92" text-anchor="middle" dominant-baseline="central">11</text>

    <g opacity="0.4" filter="url(#glow)"><circle cx="206" cy="318" r="30" fill="#ffc36b"/></g>
    <circle cx="206" cy="318" r="30" fill="url(#rivC)" filter="url(#wob)"/>
    <text x="206" y="318" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#ffffff" fill-opacity="0.92" text-anchor="middle" dominant-baseline="central">4</text>

    <g opacity="0.4" filter="url(#glow)"><circle cx="540" cy="306" r="26" fill="#a78bff"/></g>
    <circle cx="540" cy="306" r="26" fill="url(#rivB)" filter="url(#wob)"/>
    <text x="540" y="306" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#ffffff" fill-opacity="0.92" text-anchor="middle" dominant-baseline="central">5</text>
  </g>

  <!-- player trail + blob (the hero) -->
  <path d="M168 332 C 226 300 250 268 314 216" fill="none" stroke="#7dffb2" stroke-opacity="0.20" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
  <g opacity="0.6" filter="url(#glow)"><circle cx="320" cy="212" r="72" fill="#7dffb2"/></g>
  <circle cx="320" cy="212" r="72" fill="url(#player)" filter="url(#wob)"/>
  <circle cx="320" cy="212" r="8" fill="#08101d"/>
  <text x="320" y="212" font-family="system-ui,sans-serif" font-size="34" font-weight="900" fill="#ffffff" fill-opacity="0.95" text-anchor="middle" dominant-baseline="central">12</text>

  <!-- math bonus chip (the educational hook) -->
  <g transform="translate(28,26)">
    <rect width="158" height="50" rx="14" fill="#08121f" fill-opacity="0.85" stroke="#77e4ff" stroke-opacity="0.65" stroke-width="2"/>
    <text x="20" y="33" font-family="system-ui,sans-serif" font-size="23" font-weight="800" fill="#eaf6ff">6 × 7</text>
    <g transform="translate(110,11)">
      <rect width="38" height="28" rx="10" fill="#7dffb2"/>
      <text x="19" y="20" font-family="system-ui,sans-serif" font-size="16" font-weight="900" fill="#06301a" text-anchor="middle">+3</text>
    </g>
  </g>
</svg>
